# Applies ALB Ingress resources from k8s-eks/platform/ingress/
# Wave 2: after AWS LB Controller (wave 0) is fully ready.
# Replaces GKE/AKS ingress-apps (which included ClusterIssuer + NGINX Ingresses).
# On EKS: no ClusterIssuer needed — ALB uses ACM certificate directly.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-apps
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/NilkanthMiyani/jerney-eks.git
    targetRevision: main
    path: k8s-eks/platform/ingress
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 10
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
