# AWS Load Balancer Controller — replaces NGINX Ingress Controller (GKE/AKS).
# Creates an ALB for each Ingress (or shared via group.name annotation).
# The ALB handles TLS termination using ACM certificates — no cert-manager needed.
# Wave 0: must be ready before Ingress resources in platform/ingress are applied.
#
# IRSA service account annotation is set here to grant the controller
# AWS permissions (create/manage ALBs, Target Groups, etc.).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aws-lb-controller
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://aws.github.io/eks-charts
    chart: aws-load-balancer-controller
    targetRevision: "1.11.x"
    helm:
      values: |
        clusterName: jerney-eks
        serviceAccount:
          create: true
          name: aws-load-balancer-controller
          annotations:
            eks.amazonaws.com/role-arn: REPLACE_WITH_ALB_CONTROLLER_ROLE_ARN
        replicaCount: 1
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
