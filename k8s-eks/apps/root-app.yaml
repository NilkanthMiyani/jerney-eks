# ==============================================================
# Root App-of-Apps
#
# This single Application tells ArgoCD to watch k8s-eks/apps/
# Every YAML file in that folder is itself an ArgoCD Application.
# ArgoCD creates them all, and each one deploys a Helm chart.
#
# Deploy order is controlled by argocd.argoproj.io/sync-wave:
#   Wave 0: aws-lb-controller
#   Wave 1: prometheus-stack, jerney, platform-secrets, platform-config
#   Wave 2: ingress-apps, loki-stack
# ==============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/NilkanthMiyani/jerney-eks.git
    targetRevision: main
    path: k8s-eks/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
