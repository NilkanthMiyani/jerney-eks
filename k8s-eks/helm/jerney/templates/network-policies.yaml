# ==============================================================
# Network Policies — EKS
#
# On EKS with AWS Load Balancer Controller, traffic flows:
#   Internet → ALB → Pod IP directly (target-type: ip)
# ALB routes to pod IPs within the VPC — no intermediate proxy pod
# like NGINX Ingress. So we allow ingress from the VPC CIDR range
# instead of a namespace selector.
#
# EKS requires the Amazon VPC CNI plugin to enforce NetworkPolicy.
# Ensure the vpc-cni addon has NetworkPolicy support enabled
# (EKS v1.25+ with vpc-cni v1.14+).
# ==============================================================

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Chart.Name }}-db-allow-backend-only
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgresql
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ .Chart.Name }}-backend
      ports:
        - port: 5432
          protocol: TCP

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Chart.Name }}-backend-allow-frontend-and-alb
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}-backend
  policyTypes:
    - Ingress
  ingress:
    # Allow from frontend pods (same namespace)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ .Chart.Name }}-frontend
      ports:
        - port: 5000
          protocol: TCP
    # Allow from ALB — with target-type: ip, ALB sends traffic directly
    # to pod IPs from VPC CIDR. Allow traffic from the VPC range.
    # (On GKE/AKS with NGINX Ingress, this was namespaceSelector: ingress-nginx)
    - from:
        - ipBlock:
            cidr: 10.0.0.0/16
      ports:
        - port: 5000
          protocol: TCP
    # Allow Prometheus scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 5000
          protocol: TCP
