# ==============================================================
# ClusterSecretStore — AWS Secrets Manager (EKS)
#
# The ESO operator + CRDs are installed by Terraform (eks-bootstrap).
# This ClusterSecretStore is managed by the `platform-secrets` ArgoCD app
# so it is applied *after* the CRDs exist (a CR cannot ship inside the same
# Helm release as its CRD). sync-wave "-1" creates it before the
# ExternalSecrets in this same path that reference it.
#
# Auth: IRSA — the `external-secrets` ServiceAccount is annotated with the
# ESO IAM role ARN by Terraform (var.eso_role_arn).
# ==============================================================
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
