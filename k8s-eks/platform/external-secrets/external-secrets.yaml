# ==============================================================
# ExternalSecrets — AWS Secrets Manager
#
# Identical structure to GKE/AKS external-secrets.yaml.
# Only change:
#   GKE: secretStoreRef.name: gcp-secret-manager
#   AKS: secretStoreRef.name: azure-keyvault
#   EKS: secretStoreRef.name: aws-secrets-manager
#   (remoteRef.key values are the same — secret names match across all clouds)
# ==============================================================

# PostgreSQL password → K8s Secret "jerney-db-credentials" in namespace "jerney"
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jerney-db-credentials
  namespace: jerney
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: jerney-db-credentials
  data:
    - secretKey: password
      remoteRef:
        key: jerney-postgres-password
---
# Grafana admin credentials → K8s Secret "jerney-grafana-credentials" in namespace "monitoring"
# Grafana chart expects TWO keys: admin-user + admin-password
# Username is static ("admin"), password comes from Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jerney-grafana-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: jerney-grafana-credentials
    template:
      data:
        admin-user: admin
        admin-password: "{{ .admin_password }}"
  data:
    - secretKey: admin_password
      remoteRef:
        key: jerney-grafana-admin-password
---
# Alertmanager SMTP key → K8s Secret "alertmanager-smtp-key" in namespace "monitoring"
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-smtp-key
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: alertmanager-smtp-key
  data:
    - secretKey: smtp_auth_password
      remoteRef:
        key: jerney-alertmanager-smtp-key
