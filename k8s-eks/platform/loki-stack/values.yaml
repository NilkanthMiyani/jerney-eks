# Identical to GKE/AKS loki-stack values — no EKS-specific changes needed.
loki:
  enabled: true
  image:
    # Pinned to 2.9.10 — Grafana 10/11 health check sends vector() query
    # which requires Loki >= 2.9. Default loki-stack installs ~2.6.x.
    tag: "2.9.10"

promtail:
  enabled: true

grafana:
  enabled: false
  sidecar:
    datasources:
      enabled: false
